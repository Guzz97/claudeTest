name: Claude Bot
on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  claude_review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          # Hand the key directly to the action here:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
        env:
          # Keep the token here so it has permission to comment
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
